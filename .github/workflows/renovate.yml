name: Renovate

on:
  schedule:
    # Mondays at 04:00 UTC (≈ early Monday Europe/Berlin) — matches schedule:earlyMondays in renovate.json
    - cron: "0 4 * * 1"
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Renovate log level"
        required: false
        default: "info"
        type: choice
        options:
          - debug
          - info
          - warn
      dryRun:
        description: "Dry run (no PRs created)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

# Renovate needs to read repo state and write branches/PRs.
permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: renovate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@v41.0.5
        with:
          configurationFile: renovate.json
          token: ${{ secrets.RENOVATE_TOKEN || secrets.GITHUB_TOKEN }}
        env:
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
          RENOVATE_DRY_RUN: ${{ inputs.dryRun || 'false' }}
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_PLATFORM: github
          # Allow Spring AI milestones / RCs (matches packageRule in renovate.json).
          RENOVATE_IGNORE_UNSTABLE: "false"
