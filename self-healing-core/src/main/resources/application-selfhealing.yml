self-healing:
  enabled: true
  max-retries: 3
  llm-provider: anthropic
  source-base-path: ${user.dir}
  triage:
    enabled: true
  git-pr:
    enabled: false  # Enable to auto-create PRs for healed locators
    remote-name: origin
    base-branch: main
    branch-prefix: fix/self-healing-
    github-token: ${GITHUB_TOKEN:}
    github-repo-owner: ${GITHUB_REPO_OWNER:}
    github-repo-name: ${GITHUB_REPO_NAME:}

---
spring:
  config:
    activate:
      on-profile: anthropic
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-sonnet-4-6
          temperature: 0.1
          max-tokens: 4096
          cache-options:
            strategy: system-only

---
spring:
  config:
    activate:
      on-profile: openai
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-4.1
          temperature: 0.1
          max-tokens: 4096

---
spring:
  config:
    activate:
      on-profile: mistral
  ai:
    mistralai:
      api-key: ${MISTRAL_API_KEY:}
      chat:
        options:
          model: codestral-latest
          temperature: 0.1

---
spring:
  config:
    activate:
      on-profile: local
  ai:
    openai:
      base-url: http://localhost:1234/v1
      api-key: lm-studio
      chat:
        options:
          model: local-model
          temperature: 0.1
