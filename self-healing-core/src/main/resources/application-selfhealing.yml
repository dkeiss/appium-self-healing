# Disable Spring AI embedding / image / audio / moderation auto-configs globally —
# the self-healing pipeline only needs a ChatClient. Without this, the Mistral and
# OpenAI embedding auto-configs fire on every profile and fail with "API key must be set"
# whenever the active profile is a different provider (e.g. anthropic).
spring:
  ai:
    model:
      embedding: none
      image: none
      audio:
        speech: none
        transcription: none
      moderation: none
      ocr: none

self-healing:
  enabled: true
  max-retries: 3
  llm-provider: anthropic
  source-base-path: ${user.dir}
  triage:
    enabled: true
  mcp:
    enabled: false  # Enable when appium-mcp sidecar is running
  cache:
    enabled: ${SELF_HEALING_CACHE_ENABLED:true}  # Set to false for LLM benchmark runs so a bad early heal cannot poison later scenarios
  git-pr:
    enabled: false  # Enable to auto-create PRs for healed locators
    dry-run: false  # When true, log the PR plan (branch, commit, body) without push/API call — verify before enabling
    remote-name: origin
    base-branch: main
    branch-prefix: fix/self-healing-
    github-token: ${GITHUB_TOKEN:}
    github-repo-owner: ${GITHUB_REPO_OWNER:}
    github-repo-name: ${GITHUB_REPO_NAME:}

---
# Appium MCP Server integration (when enabled)
spring:
  config:
    activate:
      on-profile: mcp
  ai:
    mcp:
      client:
        stdio:
          connections:
            appium-mcp:
              command: appium-mcp
              args:
                - --appium-host
                - ${APPIUM_MCP_HOST:android-emulator}
                - --appium-port
                - ${APPIUM_MCP_PORT:4723}

self-healing:
  mcp:
    enabled: true

---
spring:
  config:
    activate:
      on-profile: anthropic
  ai:
    model:
      chat: anthropic
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-sonnet-4-6
          temperature: 0.1
          max-tokens: 4096
          cache-options:
            strategy: system-only

---
spring:
  config:
    activate:
      on-profile: openai
  ai:
    model:
      chat: openai
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-4.1
          temperature: 0.1
          max-tokens: 4096

---
spring:
  config:
    activate:
      on-profile: mistral
  ai:
    model:
      chat: mistral
    mistralai:
      api-key: ${MISTRAL_API_KEY:}
      chat:
        options:
          model: codestral-latest
          temperature: 0.1

---
spring:
  config:
    activate:
      on-profile: local
  ai:
    model:
      chat: openai
    anthropic:
      api-key: disabled-anthropic
    mistralai:
      api-key: disabled-mistral
    openai:
      base-url: ${LM_STUDIO_URL:http://localhost:1234}
      api-key: lm-studio
      chat:
        options:
          model: ${LM_STUDIO_MODEL:local-model}
          temperature: 0.1

