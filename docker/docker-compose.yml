services:

  # ─── Android Emulator with Appium built-in ────────────────────────
  android-emulator:
    image: budtmo/docker-android:emulator_14.0
    privileged: true
    ports:
      - "6080:6080"    # noVNC — view emulator at http://localhost:6080
      - "5555:5555"    # ADB
      - "4723:4723"    # Appium
    environment:
      EMULATOR_DEVICE: "Samsung Galaxy S10"
      WEB_VNC: "true"
      APPIUM: "true"
      APPIUM_PORT: "4723"
      RELAXED_SECURITY: "true"
    volumes:
      - ../android-app/app/build/outputs/apk:/app/apks:ro
    devices:
      - /dev/kvm
    healthcheck:
      test: ["CMD-SHELL", "adb shell getprop sys.boot_completed 2>/dev/null | grep -q '1' && wget -qO- http://localhost:4723/status > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 180s
    deploy:
      resources:
        limits:
          memory: 4g

  # ─── Train Connection Backend ─────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/v1/connections/all || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── Backend port forwarder for Android emulator ───────────────────
  # The Android app connects to 10.0.2.2:8080 (emulator's host loopback).
  # This sidecar shares the emulator's network namespace and forwards
  # port 8080 to the backend service so the app can reach the API.
  backend-forwarder:
    image: alpine/socat
    network_mode: "service:android-emulator"
    depends_on:
      backend:
        condition: service_healthy
    command: "TCP4-LISTEN:8080,fork,reuseaddr TCP4:backend:8080"
    restart: unless-stopped

  # NOTE: Spring AI's MCP client uses stdio transport and spawns `appium-mcp`
  # as a subprocess of the JVM — Node.js and the MCP server are pre-installed
  # in Dockerfile.tests, so no sidecar is needed.

  # ─── Self-Healing Test Runner ─────────────────────────────────────
  test-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.tests
    depends_on:
      android-emulator:
        condition: service_healthy
      backend:
        condition: service_healthy
      backend-forwarder:
        condition: service_started
    env_file:
      - .env
    environment:
      APPIUM_URL: "http://android-emulator:4723"
      BACKEND_URL: "http://backend:8080"
      SPRING_PROFILES_ACTIVE: "${LLM_PROVIDER:-anthropic}"
      APP_APK_PATH: "/app/apks/${APP_VERSION:-v1}/debug/app-${APP_VERSION:-v1}-debug.apk"
      APP_VERSION: "${APP_VERSION:-v1}"
      LM_STUDIO_URL: "${LM_STUDIO_URL:-http://host.docker.internal:1234}"
    extra_hosts:
      # Podman on WSL2 does not inject host.docker.internal automatically.
      # host-gateway resolves to the container's default route (Windows host IP),
      # matching the behaviour Docker Desktop provides out of the box.
      - "host.docker.internal:host-gateway"
    volumes:
      - ../build/reports:/app/integration-tests/build/reports
      - ../android-app/app/build/outputs/apk:/app/apks:ro
    profiles:
      - single-run   # only start this service when --profile single-run is given,
                     # so that `--profile benchmark` / `--profile mcp-benchmark`
                     # do not also spin up an unconfigured test-runner.

  # ─── Benchmark Runner (runs all LLM providers) ───────────────────
  benchmark-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.tests
    depends_on:
      android-emulator:
        condition: service_healthy
      backend:
        condition: service_healthy
      backend-forwarder:
        condition: service_started
    environment:
      APPIUM_URL: "http://android-emulator:4723"
      BACKEND_URL: "http://backend:8080"
      APP_APK_PATH: "/app/apks/v2/debug/app-v2-debug.apk"
      LM_STUDIO_URL: "${LM_STUDIO_URL:-http://host.docker.internal:1234}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    volumes:
      - ../build/reports:/app/build/reports
      - ../android-app/app/build/outputs/apk:/app/apks:ro
    entrypoint:
      - sh
      - -c
      - |
        echo '=== LLM Benchmark: Self-Healing Comparison ==='
        echo '--- Giving emulator UiAutomator2 extra time to warm up ---'
        sleep 60
        for provider in anthropic openai mistral local-qwen3-next local-devstral local-qwen3-30b; do
          echo "--- Running with $$provider ---"
          for attempt in 1 2 3; do
            echo "Attempt $$attempt for $$provider..."
            if SPRING_PROFILES_ACTIVE=$$provider LLM_PROVIDER=$$provider \
                 ./gradlew :integration-tests:test --no-daemon --rerun \
                 -Dcucumber.filter.tags='@self-healing' 2>&1 \
               | tee /app/build/reports/benchmark-$$provider.log; then
              echo "--- $$provider PASSED on attempt $$attempt ---"; break
            fi
            echo "--- $$provider FAILED on attempt $$attempt ---"
            [ $$attempt -lt 3 ] && sleep 20
          done
        done
        echo '=== Benchmark complete ==='
    profiles:
      - benchmark

  # ─── MCP vs. no-MCP Comparison (very-hard-navigation track) ──────
  # Runs each of the three cloud LLMs twice — once without MCP, once
  # with — against the "@very-hard-navigation" scenario, so we can
  # tell whether the MCP enrichment step pays for its extra tokens.
  mcp-comparison-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.tests
    depends_on:
      android-emulator:
        condition: service_healthy
      backend:
        condition: service_healthy
      backend-forwarder:
        condition: service_started
    environment:
      APPIUM_URL: "http://android-emulator:4723"
      BACKEND_URL: "http://backend:8080"
      APP_APK_PATH: "/app/apks/v2/debug/app-v2-debug.apk"
      APP_VERSION: "v2"
      SELF_HEALING_CACHE_ENABLED: "false"
      APPIUM_MCP_HOST: "android-emulator"
      APPIUM_MCP_PORT: "4723"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    volumes:
      - ../build/reports:/app/build/reports
      - ../android-app/app/build/outputs/apk:/app/apks:ro
    entrypoint:
      - sh
      - -c
      - |
        set -u
        echo '=== MCP vs. no-MCP Comparison — very-hard-navigation ==='
        mkdir -p /app/build/reports/mcp-comparison
        echo '--- Warming up emulator UiAutomator2 ---'
        sleep 90
        for provider in anthropic openai mistral; do
          for mcp in off on; do
            if [ "$$mcp" = "on" ]; then
              profiles="$$provider,mcp"
              mcp_tag="mcp"
            else
              profiles="$$provider"
              mcp_tag="nomcp"
            fi
            label="$$provider-$$mcp_tag"
            track="very-hard-navigation-$$mcp_tag"
            echo "=== RUN: $$label (profiles=$$profiles track=$$track) ==="
            passed=0
            for attempt in 1 2 3; do
              echo "--- attempt $$attempt for $$label ---"
              if SPRING_PROFILES_ACTIVE=$$profiles LLM_PROVIDER=$$provider \
                   ./gradlew :integration-tests:test --no-daemon --rerun \
                   -Dcucumber.filter.tags='@very-hard-navigation' \
                   -Dbenchmark.enabled=true \
                   -Dbenchmark.track-name=$$track \
                   -Dbenchmark.difficulty=HARD \
                   -Dbenchmark.output-dir=/app/build/reports/mcp-comparison 2>&1 \
                 | tee /app/build/reports/mcp-comparison/$$label.log; then
                echo "--- $$label PASSED on attempt $$attempt ---"
                passed=1
                break
              fi
              echo "--- $$label FAILED on attempt $$attempt ---"
              [ $$attempt -lt 3 ] && sleep 20
            done
            if [ $$passed -eq 0 ]; then
              echo "--- $$label GAVE UP after 3 attempts ---"
            fi
          done
        done
        echo '=== MCP comparison complete ==='
        ls -la /app/build/reports/mcp-comparison/ || true
    profiles:
      - mcp-benchmark
