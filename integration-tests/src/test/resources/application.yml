appium:
  url: ${APPIUM_URL:http://localhost:4723}

app:
  package: de.keiss.selfhealing.app
  activity: de.keiss.selfhealing.app.MainActivity
  apk-path: ${APP_APK_PATH:}

self-healing:
  enabled: true
  max-retries: 3
  llm-provider: ${LLM_PROVIDER:anthropic}
  source-base-path: ${user.dir}/integration-tests
  triage:
    enabled: true

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:anthropic},selfhealing
  config:
    import: classpath:application-selfhealing.yml
  ai:
    retry:
      # Treat HTTP 429 (rate limit) as transient so Spring AI retries with backoff
      # instead of throwing NonTransientAiException immediately.
      on-http-codes: [429]
